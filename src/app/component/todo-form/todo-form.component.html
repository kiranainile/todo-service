<div class="card ">
    <div class="card-body">
        <h2>{{isInEditMode ? 'UPDATE TODO' :'ADD TODO'}}</h2>
        <div class="form-group">
            <label for="todoItem"><b>TODOITEM</b></label>
            <input type="text" #todoItem class="form-control">
        </div>
        <div class="form-group">
            <label for="isComplated"><b>ISComplated</b></label>
            <select type="text" #isComplated class="form-control">
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>
        </div>
        
        <button 
        *ngIf="!isInEditMode"
        (click)="ontodoadd()"
        mat-raised-button color="primary" class="w-100">ADD TODO</button>
        <button
        *ngIf="isInEditMode"
        (click)="onUpdateTodo()"
        mat-raised-button color="warn" class="w-100"> UPDATE TODO</button>
    </div>
</div>
